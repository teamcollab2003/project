<div class="container my-5" style="max-width: 800px;">
  
  <div class="text-center mb-4">
    <h2 class="fw-bold text-dark">Smart Budget Personalizer</h2>
    <p class="text-muted">Select who you are to see how the Mauritian National Budget affects your wallet.</p>
  </div>

  <!-- Persona Cards -->
  <div class="row g-3 mb-4">
    <div class="col-6 col-md-3" *ngFor="let persona of personas">
      <div 
        class="card h-100 text-center border-2 transition-hover" 
        [ngClass]="selectedPersona === persona.id 
          ? 'bg-primary text-white border-primary shadow-lg' 
          : 'bg-white text-dark border-light-subtle shadow-sm'"
        (click)="selectPersona(persona.id)"
        style="cursor: pointer;">
        <div class="card-body p-3">
          <div class="fs-1 mb-2">{{ persona.icon }}</div>
          <h6 class="card-title fw-bold mb-1">{{ persona.title }}</h6>
        </div>
      </div>
    </div>
  </div>

  <!-- Dynamic Form & Results Container -->
  <div class="card shadow-sm border-0 bg-body-tertiary">
    <div class="card-body p-4">
      <form (ngSubmit)="submitForm()">

        <!-- 🎓 STUDENT -->
        <div *ngIf="selectedPersona === 'student'">
          
          <!-- Age Field -->
          <div class="form-floating mb-3">
            <input 
              type="text" 
              inputmode="numeric" 
              pattern="[0-9]*" 
              class="form-control border-secondary-subtle" 
              id="studentAge" 
              [(ngModel)]="formData.age" 
              name="studentAge" 
              placeholder="21">
            <label for="studentAge" class="text-secondary">Age</label>
          </div>

          <!-- Level of Study Field -->
          <div class="form-floating mb-3">
            <select class="form-select border-secondary-subtle" id="studyLevel" [(ngModel)]="formData.studyLevel" name="studyLevel">
              <option value="" disabled selected>Choose your level...</option>
              <option value="secondary">Secondary</option>
              <option value="tertiary">Tertiary / University</option>
              <option value="vocational">Vocational / MITD </option>
            </select>
            <label for="studyLevel" class="text-secondary">Level of Study</label>
          </div>

          <!-- Institution Location-->
          <div class="mb-3">
            <label class="form-label d-block text-secondary small fw-bold mb-2">Institution Location</label>
            <div class="btn-group w-100 shadow-sm" role="group">
              <input type="radio" class="btn-check" name="studyLocation" id="locLocal" value="local" [(ngModel)]="formData.studyLocation">
              <label class="btn btn-outline-primary py-2 fw-semibold" for="locLocal">Local </label>
              
              <input type="radio" class="btn-check" name="studyLocation" id="locAbroad" value="abroad" [(ngModel)]="formData.studyLocation">
              <label class="btn btn-outline-primary py-2 fw-semibold" for="locAbroad">Abroad</label>
            </div>
          </div>

          <!-- Do you work part-time? -->
          <div class="mb-3">
            <label class="form-label d-block text-secondary small fw-bold mb-2">Do you work part-time?</label>
            <div class="btn-group w-100 shadow-sm" role="group">
              <input type="radio" class="btn-check" name="partTimeWork" id="ptYes" value="yes" [(ngModel)]="formData.partTimeWork">
              <label class="btn btn-outline-primary py-2 fw-semibold" for="ptYes">Yes</label>
              
              <input type="radio" class="btn-check" name="partTimeWork" id="ptNo" value="no" [(ngModel)]="formData.partTimeWork">
              <label class="btn btn-outline-primary py-2 fw-semibold" for="ptNo">No</label>
            </div>
          </div>

        </div>

        <!-- 💼 WORKER -->
        <div *ngIf="selectedPersona === 'worker'">
          
          <!-- Age Field (New) -->
          <div class="form-floating mb-3">
            <input 
              type="text" 
              inputmode="numeric" 
              pattern="[0-9]*" 
              class="form-control border-secondary-subtle" 
              id="workerAge" 
              [(ngModel)]="formData.age" 
              name="workerAge" 
              placeholder="30">
            <label for="workerAge" class="text-secondary">Age</label>
          </div>

          <!-- Salary Range Field (Updated brackets) -->
          <div class="form-floating mb-3">
            <select class="form-select border-secondary-subtle" id="salaryRange" [(ngModel)]="formData.salaryRange" name="salaryRange">
              <option value="" disabled selected>Select range...</option>
              <option value="under15k">Under Rs 15,000</option>
              <option value="15k-20k">Rs 15,000 - Rs 20,000</option>
              <option value="20k-30k">Rs 20,000 - Rs 30,000</option>
              <option value="30k-50k">Rs 30,000 - Rs 50,000</option>
              <option value="50k-100k">Rs 50,000 - Rs 100,000</option>
              <option value="over100k">Over Rs 100,000</option>
            </select>
            <label for="salaryRange" class="text-secondary">Monthly Salary Range</label>
          </div>

          <!-- Employment Sector Field -->
          <div class="form-floating mb-3">
            <select class="form-select border-secondary-subtle" id="workerSector" [(ngModel)]="formData.sector" name="workerSector">
              <option value="" disabled selected>Where do you work?</option>
              <option value="public">Public Sector / Civil Service</option>
              <option value="private">Private Sector</option>
              <option value="freelance">Self-Employed / Freelance</option>
            </select>
            <label for="workerSector" class="text-secondary">Employment Sector</label>
          </div>

          <!-- Number of Dependents (New - positioned right after sector) -->
          <div class="form-floating mb-3">
            <select class="form-select border-secondary-subtle" id="dependents" [(ngModel)]="formData.dependents" name="dependents">
              <option value="" disabled selected>Select number...</option>
              <option value="0">None</option>
              <option value="1">1 Dependent</option>
              <option value="2">2 Dependents</option>
              <option value="3">3 Dependents</option>
              <option value="4+">4 or more</option>
            </select>
            <label for="dependents" class="text-secondary">Number of Dependents</label>
          </div>

          <!-- Housing Status (Converted from radio group to dropdown) -->
          <div class="form-floating mb-3">
            <select class="form-select border-secondary-subtle" id="housingStatus" [(ngModel)]="formData.housingStatus" name="housingStatus">
              <option value="" disabled selected>Select your status...</option>
              <option value="renter">Renter</option>
              <option value="homeowner">Home Owner</option>
              <option value="looking">Looking to buy / rent</option>
            </select>
            <label for="housingStatus" class="text-secondary">Housing Status</label>
          </div>

        </div>

        <!-- 👴 SENIOR -->
        <div *ngIf="selectedPersona === 'senior'">
          
          <!-- Age Text Box (New - replaces age bracket) -->
          <div class="form-floating mb-3">
            <input 
              type="text" 
              inputmode="numeric" 
              pattern="[0-9]*" 
              class="form-control border-secondary-subtle" 
              id="seniorAge" 
              [(ngModel)]="formData.age" 
              name="seniorAge" 
              placeholder="65">
            <label for="seniorAge" class="text-secondary">Age</label>
          </div>

          <!-- Employment Status (New) -->
          <div class="mb-3">
            <label class="form-label d-block text-secondary small fw-bold mb-2">Employment Status</label>
            <div class="btn-group w-100 shadow-sm" role="group">
              <input type="radio" class="btn-check" name="seniorEmployment" id="empWorking" value="working" [(ngModel)]="formData.employmentStatus">
              <label class="btn btn-outline-primary py-2 fw-semibold" for="empWorking">Still Working</label>
              
              <input type="radio" class="btn-check" name="seniorEmployment" id="empRetired" value="retired" [(ngModel)]="formData.employmentStatus">
              <label class="btn btn-outline-primary py-2 fw-semibold" for="empRetired">Retired</label>
            </div>
          </div>

          <!-- Carer's / Invalidity Allowance -->
          <div class="mb-3">
            <label class="form-label d-block text-secondary small fw-bold mb-2">Do you receive a Carer's or Invalidity Allowance?</label>
            <div class="btn-group w-100 shadow-sm" role="group">
              <input type="radio" class="btn-check" name="allowances" id="alwYes" value="yes" [(ngModel)]="formData.allowances">
              <label class="btn btn-outline-primary py-2 fw-semibold" for="alwYes">Yes</label>
              <input type="radio" class="btn-check" name="allowances" id="alwNo" value="no" [(ngModel)]="formData.allowances">
              <label class="btn btn-outline-primary py-2 fw-semibold" for="alwNo">No</label>
            </div>
          </div>

          <!-- Housing Status (New - placed after allowances) -->
          <div class="form-floating mb-3">
            <select class="form-select border-secondary-subtle" id="seniorHousing" [(ngModel)]="formData.housingStatus" name="seniorHousing">
              <option value="" disabled selected>Select your housing status...</option>
              <option value="renter">Renter</option>
              <option value="homeowner">Home Owner</option>
              <option value="looking">Looking to buy / rent</option>
            </select>
            <label for="seniorHousing" class="text-secondary">Housing Status</label>
          </div>

        </div>

        <!-- 🏪 SME -->
        <div *ngIf="selectedPersona === 'sme'">
          
          <!-- Gender (New - positioned as first field) -->
          <div class="mb-3">
            <label class="form-label d-block text-secondary small fw-bold mb-2">Gender of Business Founder / Owner</label>
            <div class="btn-group w-100 shadow-sm" role="group">
              <input type="radio" class="btn-check" name="smeSex" id="sexFemale" value="female" [(ngModel)]="formData.femaleEntrepreneur">
              <label class="btn btn-outline-primary py-2 fw-semibold" for="sexFemale">Female </label>
              
              <input type="radio" class="btn-check" name="smeSex" id="sexMale" value="male" [(ngModel)]="formData.femaleEntrepreneur">
              <label class="btn btn-outline-primary py-2 fw-semibold" for="sexMale">Male</label>
            </div>
          </div>

          <!-- Business Sector Field -->
          <div class="form-floating mb-3">
            <select class="form-select border-secondary-subtle" id="bizSector" [(ngModel)]="formData.businessSector" name="bizSector">
              <option value="" disabled selected>Select primary sector...</option>
              <option value="tech">ICT / Tech / AI</option>
              <option value="agriculture">Agriculture / Agro-Industry</option>
              <option value="tourism">Tourism & Hospitality</option>
              <option value="retail">Retail / Commerce</option>
              <option value="manufacturing">Manufacturing</option>
            </select>
            <label for="bizSector" class="text-secondary">Business Sector</label>
          </div>

          <!-- Annual Turnover Field (Updated brackets matching official MRA guidelines) -->
          <div class="form-floating mb-3">
            <select class="form-select border-secondary-subtle" id="turnover" [(ngModel)]="formData.turnover" name="turnover">
              <option value="" disabled selected>Select annual turnover...</option>
              <option value="micro">Under Rs 10 Million (Microenterprise)</option>
              <option value="small">Rs 10M - Rs 30M (Small enterprise)</option>
              <option value="medium">Rs 30M - Rs 50M (Medium - Tier 1)</option>
              <option value="mediumLarge">Rs 50M - Rs 100M (Medium - Tier 2)</option>
              <option value="midMarket">Over Rs 100 Million (Mid-Market / Corporate)</option>
            </select>
            <label for="turnover" class="text-secondary">Annual Turnover</label>
          </div>

          <!-- Number of Employees (New) -->
          <div class="form-floating mb-3">
            <input type="number" class="form-control border-secondary-subtle" id="smeEmployees" [(ngModel)]="formData.employees" name="smeEmployees" placeholder="5">
            <label for="smeEmployees" class="text-secondary">Number of Employees (Impacts CSG & PRGF contributions)</label>
          </div>

          <!-- Trade / Import & Export (New) -->
          <div class="mb-3">
            <label class="form-label d-block text-secondary small fw-bold mb-2">Trade Activity</label>
            <div class="btn-group w-100 shadow-sm" role="group">
              <input type="radio" class="btn-check" name="smeTrade" id="tradeNone" value="domestic" [(ngModel)]="formData.importExport">
              <label class="btn btn-outline-primary py-2 fw-semibold" for="tradeNone">Only Local Trade</label>
              
              <input type="radio" class="btn-check" name="smeTrade" id="tradeImport" value="import" [(ngModel)]="formData.importExport">
              <label class="btn btn-outline-primary py-2 fw-semibold" for="tradeImport">Importer</label>

              <input type="radio" class="btn-check" name="smeTrade" id="tradeExport" value="export" [(ngModel)]="formData.importExport">
              <label class="btn btn-outline-primary py-2 fw-semibold" for="tradeExport">Exporter</label>
            </div>
          </div>

        </div>

        <hr class="my-4 border-secondary-subtle">
        
        <!-- CLEAN BUTTON: Disables and displays status text (no lagging spinning wheels) -->
        <button type="submit" [disabled]="isLoading" class="btn btn-primary btn-lg w-100 fw-bold shadow">
          {{ isLoading ? 'Analyzing Budget Impact...' : 'Generate AI Budget Impact' }}
        </button>
        
      </form>

      <!--  CLEAN DISPLAY AREA: Appends directly below form -->
      <div class="mt-4 pt-3 border-top border-secondary-subtle" *ngIf="isLoading || aiResponse">
        
        <!-- Clean Text-Based Loading State -->
        <div class="text-center py-4" *ngIf="isLoading">
          <p class="text-muted fw-semibold mb-0">Smart Budget Moris is calculating your personalized report...</p>
        </div>

        <!-- Rendered budget analysis report -->
        <div *ngIf="!isLoading && aiResponse" class="fade-in">
          <div class="d-flex align-items-center mb-3">
            <span class="fs-3 me-2">🇲🇺</span>
            <h4 class="fw-bold text-dark m-0">Your Personalized Budget Report</h4>
          </div>
          
          <!-- Preserves original line breaks, bullet formatting, and structure -->
          <pre class="bg-white p-4 border border-secondary-subtle rounded-3 text-dark shadow-sm m-0" 
               style="white-space: pre-wrap; font-family: inherit; line-height: 1.6; font-size: 15px; max-height: 500px; overflow-y: auto;">{{ aiResponse }}</pre>
        </div>

      </div>
      
    </div>
  </div>
</div>
